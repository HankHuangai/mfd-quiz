<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFD 金錢財務性格測驗</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh;padding:1rem}
.wrap{max-width:640px;margin:0 auto;padding:2rem 1.25rem;background:white;border-radius:16px;min-height:100vh}
.screen{display:none}.screen.active{display:block}
.eyebrow{font-size:11px;letter-spacing:0.1em;color:#888;margin-bottom:1rem;text-transform:uppercase}
.title{font-size:24px;font-weight:500;color:#1a1a1a;line-height:1.4;margin-bottom:1rem}
.body-text{font-size:15px;color:#555;line-height:1.8;margin-bottom:0.75rem}
.meta{font-size:13px;color:#aaa;margin-bottom:2rem}
.prog-wrap{margin-bottom:1.75rem}
.prog-label{font-size:12px;color:#aaa;margin-bottom:0.5rem}
.prog-bar{height:2px;background:#e8e8e8;border-radius:1px}
.prog-fill{height:2px;background:#1D9E75;border-radius:1px;transition:width 0.4s ease}
.phase-tag{font-size:11px;letter-spacing:0.08em;color:#aaa;margin-bottom:0.75rem;text-transform:uppercase}
.q-text{font-size:17px;font-weight:500;color:#1a1a1a;line-height:1.6;margin-bottom:1.5rem}
.step-label{font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:0.75rem}
.step-like{background:#E1F5EE;color:#0F6E56}
.step-unlike{background:#FAECE7;color:#993C1D}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.opt{display:flex;align-items:flex-start;gap:12px;border:0.5px solid #e0e0e0;border-radius:12px;padding:0.9rem 1.1rem;cursor:pointer;transition:all 0.15s;background:white}
.opt:hover{border-color:#bbb;background:#fafafa}
.opt.like{border:1.5px solid #1D9E75;background:#E1F5EE}
.opt.unlike{border:1.5px solid #D85A30;background:#FAECE7}
.opt.disabled{opacity:0.3;pointer-events:none}
.opt-letter{font-size:12px;font-weight:500;color:#aaa;min-width:18px;margin-top:2px;flex-shrink:0}
.opt.like .opt-letter{color:#0F6E56}
.opt.unlike .opt-letter{color:#712B13}
.opt-text{font-size:14px;color:#1a1a1a;line-height:1.6}
.opt.like .opt-text{color:#085041}
.opt.unlike .opt-text{color:#712B13}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem}
.btn{border:0.5px solid #ccc;background:transparent;color:#333;font-size:14px;padding:9px 22px;border-radius:8px;cursor:pointer;transition:all 0.15s}
.btn:hover{background:#f5f5f5}
.btn.primary{background:#1D9E75;border-color:#1D9E75;color:white;font-weight:500}
.btn.primary:hover{background:#0F6E56}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.btn-ghost{font-size:13px;color:#aaa;background:none;border:none;cursor:pointer;padding:9px 0}
.btn-ghost:hover{color:#555}
.trans-wrap{padding:2rem 0}
.trans-badge{display:inline-block;font-size:13px;font-weight:500;padding:6px 18px;border-radius:20px;margin-bottom:1rem}
.trans-text{font-size:15px;color:#555;line-height:1.8;margin-bottom:2rem}
.dir-bars{display:flex;gap:16px;align-items:flex-start;margin-bottom:2rem}
.dir-block{text-align:center}
.dir-block-label{font-size:11px;color:#aaa;margin-bottom:4px}
.dir-block-bar{width:80px;height:8px;border-radius:4px;background:#e8e8e8;overflow:hidden}
.dir-block-fill{height:8px;border-radius:4px}
.dir-block-val{font-size:13px;font-weight:500;margin-top:4px}
.result-badge{display:inline-block;font-size:12px;font-weight:500;padding:4px 14px;border-radius:8px;margin-bottom:1rem}
.result-title{font-size:22px;font-weight:500;color:#1a1a1a;margin-bottom:0.25rem}
.result-role{font-size:14px;margin-bottom:1.5rem}
.result-desc{font-size:15px;color:#1a1a1a;line-height:1.8;margin-bottom:1.75rem}
.slabel{font-size:11px;letter-spacing:0.08em;color:#aaa;margin-bottom:0.6rem;text-transform:uppercase}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.tag{font-size:13px;padding:4px 12px;border-radius:20px;border:0.5px solid #e0e0e0;color:#555;background:#f5f5f5}
.tag.g{background:#E1F5EE;color:#0F6E56;border-color:#9FE1CB}
.tag.r{background:#FAECE7;color:#993C1D;border-color:#F5C4B3}
.tip-box{border-left:2px solid #ddd;padding:0.75rem 1rem;margin-bottom:1.75rem;border-radius:0 8px 8px 0;background:#f9f9f9}
.tip-box p{font-size:14px;color:#555;line-height:1.8}
.sig-box{padding:1rem 1.25rem;border-radius:12px;border:0.5px solid #e0e0e0;margin-bottom:1.5rem;background:#f9f9f9}
.sig-box p{font-size:14px;color:#555;line-height:1.8}
.bars{display:flex;flex-direction:column;gap:8px;margin-bottom:1.75rem}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-code{font-size:12px;color:#555;width:26px}
.bar-track{flex:1;height:5px;background:#e8e8e8;border-radius:3px;overflow:hidden}
.bar-fill{height:5px;border-radius:3px;transition:width 0.9s ease}
.bar-num{font-size:11px;color:#aaa;width:24px;text-align:right}
.bar-role{font-size:11px;color:#aaa}
.divider{border:none;border-top:0.5px solid #e8e8e8;margin:1.5rem 0}
</style>
</head>
<body>
<div class="wrap">

<div class="screen active" id="s-intro">
  <p class="eyebrow">MFD 金錢財務性格測驗</p>
  <p class="title">你跟金錢的關係，<br>比你以為的更有結構</p>
  <p class="body-text">根據榮格心理類型理論，透過兩階段找出你在金錢財務上的主導功能。每題請選出最像你和最不像你的答案，讓結果更精準。</p>
  <p class="meta">共 11 題 · 分兩階段 · 約 5 分鐘</p>
  <button class="btn primary" onclick="start()">開始測驗</button>
</div>

<div class="screen" id="s-p1">
  <div class="prog-wrap">
    <p class="prog-label" id="p1-label">第 1 題，共 3 題</p>
    <div class="prog-bar"><div class="prog-fill" id="p1-prog" style="width:33%"></div></div>
  </div>
  <p class="phase-tag">第一階段 · 能量方向</p>
  <p class="q-text" id="p1-q"></p>
  <div class="opts" id="p1-opts"></div>
  <div class="nav">
    <button class="btn-ghost" id="p1-back" onclick="p1Back()">← 上一題</button>
    <button class="btn primary" id="p1-next" onclick="p1Next()" disabled>下一題</button>
  </div>
</div>

<div class="screen" id="s-trans">
  <div class="trans-wrap">
    <p class="eyebrow">第一階段完成</p>
    <div class="trans-badge" id="trans-badge"></div>
    <p class="trans-text" id="trans-text"></p>
    <div class="dir-bars">
      <div class="dir-block">
        <p class="dir-block-label">外向</p>
        <div class="dir-block-bar"><div class="dir-block-fill" id="e-bar" style="background:#185FA5"></div></div>
        <p class="dir-block-val" id="e-val"></p>
      </div>
      <div style="font-size:13px;color:#aaa;padding-top:12px">vs</div>
      <div class="dir-block">
        <p class="dir-block-label">內向</p>
        <div class="dir-block-bar"><div class="dir-block-fill" id="i-bar" style="background:#0F6E56"></div></div>
        <p class="dir-block-val" id="i-val"></p>
      </div>
    </div>
    <button class="btn primary" onclick="startP2()">進入第二階段</button>
  </div>
</div>

<div class="screen" id="s-p2">
  <div class="prog-wrap">
    <p class="prog-label" id="p2-label">題目 1／8　步驟 1／2</p>
    <div class="prog-bar"><div class="prog-fill" id="p2-prog" style="width:6%"></div></div>
  </div>
  <p class="phase-tag">第二階段 · 功能傾向</p>
  <p class="q-text" id="p2-q"></p>
  <span class="step-label step-like" id="step-label">最像你的第一個念頭是？</span>
  <div class="opts" id="p2-opts"></div>
  <div class="nav">
    <button class="btn-ghost" id="p2-back" onclick="p2Back()">← 上一步</button>
    <button class="btn primary" id="p2-next" onclick="p2Next()" disabled>下一步</button>
  </div>
</div>

<div class="screen" id="s-result">
  <div id="result-body"></div>
  <hr class="divider">
  <button class="btn" onclick="restart()">重新測驗</button>
</div>

</div>
<script>
const Q1=[
  {text:"賺到錢或達成財務目標時，你通常的反應是？",
   a:{text:"想告訴重要的人，說出來分享才覺得真實完整",val:"e"},

  {text:"關於金錢的想法，你通常怎麼讓它變得更清晰？",
   a:{text:"跟別人討論之後，思路才會真正清楚",val:"e"},
   b:{text:"自己安靜獨處思考，不被打擾時才能想清楚",val:"i"}},

  {q:"你剛收到相當於一個月收入的意外之財",opts:[

    {text:"這是更大計畫的第一步，讓我看到更多可能",val:"Ne"}]}
];
const Q2i=[
  {q:"你剛收到相當於一個月收入的意外之財",opts:[
    {text:"想清楚這筆錢最合理的用途和配置邏輯",val:"Ti"},

const profiles={

    strengths:["前瞻視野廣","對新趨勢敏感","創意多元","能看到潛在機會"],
    risks:["計畫多於執行","投資過度分散","容易受樂觀偏誤影響"],
    tip:"最需要警覺的是「代表性啟發法」——當一個標的符合你對未來趨勢的想像時，你可能忽略統計基礎率，對成功機率過度樂觀。"},
  Ti:{label:"內向思考",code:"Ti",role:"精算分析師",color:"#3C3489",bg:"#EEEDFE",border:"#CECBF6",text:"#26215C",
    desc:"在完全理解邏輯之前，你不輕易行動。你需要在內心建構一套完整的框架，確認每個環節都說得通才感到安心。這讓你在識破財務陷阱上有獨特的優勢。",
    strengths:["邏輯嚴謹","善於發現風險漏洞","不容易被話術說服","獨立判斷能力強"],
    risks:["容易陷入分析癱瘓","決策時間過長","過度依賴自己的框架"],
    tip:"最需要注意的是「錨定效應」——一旦你在心裡建立了某個估值或判斷，即使外部條件改變，也很難更新那個錨點。"},
  Fi:{label:"內向情感",code:"Fi",role:"價值守門人",color:"#854F0B",bg:"#FAEEDA",border:"#FAC775",text:"#412402",
    desc:"你的財務決策必須符合內在的道德羅盤。金錢是表達價值觀的方式，不只是數字。你對「這筆錢用得有沒有意義」極度敏感。",
    strengths:["決策有深層價值依據","不容易被潮流左右","有清晰的財務倫理觀","長期堅守信念一致的標的"],
    risks:["可能因價值觀拒絕合理報酬","容易有確認偏誤","猶豫期過長"],
    tip:"最需要注意的是「確認偏誤」——當一個標的符合你的價值觀時，你可能只願意看見優點，對財務基本面的缺陷視而不見。"},
  Si:{label:"內向實感",code:"Si",role:"穩定秩序守護者",color:"#27500A",bg:"#EAF3DE",border:"#C0DD97",text:"#173404",
    desc:"安全感是你財務決策的核心。你重視可預測性、熟悉感和歷史延續性，傾向選擇經過驗證的方式。你的財務紀律往往很強，基礎扎實。",
    strengths:["儲蓄紀律強","風控意識高","不容易被短期誘惑左右","財務基礎扎實"],
    risks:["容易受本土偏誤限制","對新事物過度謹慎","可能錯失成長機會"],
    tip:"最需要注意的是「現狀偏誤」——即使某個既有安排已不再最佳，你也會因為熟悉感而不願改變，可能讓你長期持有效率偏低的資產。"},
  Ni:{label:"內向直覺",code:"Ni",role:"長線戰略家",color:"#444441",bg:"#F1EFE8",border:"#D3D1C7",text:"#2C2C2A",
    desc:"你的財務思考天然以終局為導向。你不在乎短期波動，在乎的是這個決策十年後會把你帶到哪裡。金錢是實現長期人生藍圖的工具。",
    strengths:["抗壓性強、長線定力佳","宏觀整合能力強","不被短期雜訊干擾","對人生方向有清晰感"],
    risks:["可能忽略短期現金流","對細節執行缺乏耐心","確信感過強時容易閉鎖"],
    tip:"最需要注意的是「過度確信偏誤」——當你對某個長期方向深信不疑時，反面訊號很難進入你的視野，可能導致短期現金流危機被忽視。"}
};
let p1Idx=0,p1Ans=[],p1Sel=null;
let dir='',dirScore={e:0,i:0};
let p2Qs=[],p2Idx=0,p2Step=0;
let p2LikeSel=null,p2UnlikeSel=null;
let funcScores={};
function start(){
  document.getElementById('s-intro').classList.remove('active');
  p1Idx=0;p1Ans=[];p1Sel=null;
  renderP1();
  document.getElementById('s-p1').classList.add('active');
}
function renderP1(){
  const q=Q1[p1Idx];
  document.getElementById('p1-label').textContent='第 '+(p1Idx+1)+' 題，共 3 題';
  document.getElementById('p1-prog').style.width=(((p1Idx+1)/3)*100)+'%';
  document.getElementById('p1-q').textContent=q.text;
  document.getElementById('p1-back').style.visibility=p1Idx===0?'hidden':'visible';
  document.getElementById('p1-next').disabled=true;
  document.getElementById('p1-next').textContent=p1Idx===2?'查看能量方向':'下一題';
  const saved=p1Ans[p1Idx];
  const opts=document.getElementById('p1-opts');
  opts.innerHTML='';
  [{letter:'A',d:q.a},{letter:'B',d:q.b}].forEach(function(item){
    const el=document.createElement('div');
    el.className='opt'+(saved===item.d.val?' like':'');
    el.innerHTML='<span class="opt-letter">'+item.letter+'</span><span class="opt-text">'+item.d.text+'</span>';
    el.onclick=function(){
      p1Sel=item.d.val;
      document.querySelectorAll('#p1-opts .opt').forEach(function(e){e.classList.remove('like');});
      el.classList.add('like');
      document.getElementById('p1-next').disabled=false;
    };
    opts.appendChild(el);
  });
  if(saved){p1Sel=saved;document.getElementById('p1-next').disabled=false;}
}
function p1Back(){if(p1Idx>0){p1Idx--;p1Sel=p1Ans[p1Idx]||null;renderP1();}}
function p1Next(){
  if(!p1Sel)return;
  p1Ans[p1Idx]=p1Sel;
  if(p1Idx<2){p1Idx++;p1Sel=p1Ans[p1Idx]||null;renderP1();}
  else{
    dirScore={e:0,i:0};
    p1Ans.forEach(function(v){dirScore[v]++;});
    dir=dirScore.e>=dirScore.i?'e':'i';
    showTrans();
  }
}
function showTrans(){
  document.getElementById('s-p1').classList.remove('active');
  const isE=dir==='e';
  const badge=document.getElementById('trans-badge');
  badge.textContent=isE?'外向傾向 '+dirScore.e+'/3':'內向傾向 '+dirScore.i+'/3';
  badge.style.cssText=isE?'background:#E6F1FB;color:#0C447C;border:0.5px solid #B5D4F4':'background:#EAF3DE;color:#27500A;border:0.5px solid #C0DD97';
  document.getElementById('trans-text').textContent=isE?
    '你在金錢財務上的能量傾向是外向的——金錢的意義需要透過與外部世界的互動、分享或影響才能完整實現。接下來 8 題將進一步找出你的主導功能。':
    '你在金錢財務上的能量傾向是內向的——金錢的滿足感可以在內部世界自給自足，不需要外部認同才能感到完整。接下來 8 題將進一步找出你的主導功能。';
  document.getElementById('e-bar').style.width=Math.round((dirScore.e/3)*100)+'%';
  document.getElementById('i-bar').style.width=Math.round((dirScore.i/3)*100)+'%';
  document.getElementById('e-val').textContent=dirScore.e+'/3';
  document.getElementById('i-val').textContent=dirScore.i+'/3';
  document.getElementById('s-trans').classList.add('active');
}
function startP2(){
  document.getElementById('s-trans').classList.remove('active');
  p2Qs=dir==='e'?Q2e:Q2i;
  funcScores={};
  (dir==='e'?['Te','Fe','Se','Ne']:['Ti','Fi','Si','Ni']).forEach(function(k){funcScores[k]=0;});
  p2Idx=0;p2Step=0;p2LikeSel=null;p2UnlikeSel=null;
  renderP2();
  document.getElementById('s-p2').classList.add('active');
}
function renderP2(){
  const q=p2Qs[p2Idx];
  const isLike=p2Step===0;
  const total=p2Qs.length*2;
  const current=p2Idx*2+(isLike?1:2);
  document.getElementById('p2-label').textContent='題目 '+(p2Idx+1)+'／'+p2Qs.length+'　步驟 '+(isLike?1:2)+'／2';
  document.getElementById('p2-prog').style.width=Math.round((current/total)*100)+'%';
  document.getElementById('p2-q').textContent=q.q;
  const sl=document.getElementById('step-label');
  sl.textContent=isLike?'最像你的第一個念頭是？':'最不像你的是？';
  sl.className='step-label '+(isLike?'step-like':'step-unlike');
  document.getElementById('p2-back').style.visibility=(p2Idx===0&&isLike)?'hidden':'visible';
  const nextBtn=document.getElementById('p2-next');
  nextBtn.textContent=(p2Idx===p2Qs.length-1&&!isLike)?'查看結果 →':'下一步';
  const alreadySelected=isLike?(p2LikeSel!==null):(p2UnlikeSel!==null);
  nextBtn.disabled=!alreadySelected;
  const opts=document.getElementById('p2-opts');
  opts.innerHTML='';
  const letters=['A','B','C','D'];
  q.opts.forEach(function(opt,i){
    const el=document.createElement('div');
    const isLiked=opt.val===p2LikeSel;
    const isSelected=isLike?(p2LikeSel===opt.val):(p2UnlikeSel===opt.val);
    let cls='opt';
    if(isSelected) cls+=isLike?' like':' unlike';
    if(!isLike&&isLiked) cls+=' disabled';
    el.className=cls;
    el.innerHTML='<span class="opt-letter">'+letters[i]+'</span><span class="opt-text">'+opt.text+'</span>';
    el.onclick=function(){
      if(!isLike&&isLiked) return;
      if(isLike){p2LikeSel=opt.val;}
      else{p2UnlikeSel=opt.val;}
      document.getElementById('p2-next').disabled=false;
      renderP2();
    };
    opts.appendChild(el);
  });
}
function p2Back(){
  if(p2Step===1){
    funcScores[p2LikeSel]-=2;
    p2Step=0;p2UnlikeSel=null;renderP2();
  } else if(p2Idx>0){
    p2Idx--;p2Step=1;p2LikeSel=null;p2UnlikeSel=null;renderP2();
  }
}
function p2Next(){
  if(p2Step===0){
    if(!p2LikeSel)return;
    funcScores[p2LikeSel]+=2;
    p2Step=1;p2UnlikeSel=null;renderP2();
  } else {
    if(!p2UnlikeSel)return;
    funcScores[p2UnlikeSel]-=1;
    if(p2Idx<p2Qs.length-1){
      p2Idx++;p2Step=0;p2LikeSel=null;p2UnlikeSel=null;renderP2();
    } else {showResult();}
  }
}
function showResult(){
  document.getElementById('s-p2').classList.remove('active');
  const sorted=Object.entries(funcScores).sort(function(a,b){return b[1]-a[1];});
  const top=sorted[0],second=sorted[1];
  const diff=top[1]-second[1];
  const topCode=top[0];
  const p=profiles[topCode];
  const minS=-8,range=24;
  let sigHtml='';
  if(diff>=4){
    sigHtml='<div class="sig-box" style="border-color:'+p.border+';background:'+p.bg+'"><p style="color:'+p.text+'">主導功能顯著（領先 '+diff+' 分）——你在金錢財務上的心理結構相當清晰，'+p.label+'是你一致且穩定的主導方式。</p></div>';
  } else if(diff>=2){
    const s=profiles[second[0]];
    sigHtml='<div class="sig-box"><p>偏向'+p.label+'，但與'+s.label+'（'+s.code+'）差距不大（領先 '+diff+' 分）。你的主導功能明顯，但'+s.code+'的聲音也時常出現，尤其在壓力或情緒主導時。</p></div>';
  } else {
    const s=profiles[second[0]];
    sigHtml='<div class="sig-box" style="border-color:#FAC775;background:#FAEEDA"><p style="color:#633806">雙主導型：'+p.label+'（'+topCode+'）與'+s.label+'（'+second[0]+'）分數非常接近（差距僅 '+diff+' 分）。這兩種功能在你的金錢決策中同時運作，有時會出現拉鋸或搖擺，這本身就是你性格結構的一部分。</p></div>';
  }
  const bars=sorted.map(function(item){
    const code=item[0],val=item[1];
    const isTop=code===topCode;
    const pct=Math.round(((val-minS)/range)*100);
    return '<div class="bar-row"><span class="bar-code">'+code+'</span><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(0,pct)+'%;background:'+(isTop?p.color:'#ccc')+'"></div></div><span class="bar-num">'+val+'</span><span class="bar-role">'+profiles[code].role+'</span></div>';
  }).join('');
  const dirLabel=dir==='e'?'外向 '+dirScore.e+'/3':'內向 '+dirScore.i+'/3';
  const dirColor=dir==='e'?'color:#0C447C;background:#E6F1FB;border-color:#B5D4F4':'color:#27500A;background:#EAF3DE;border-color:#C0DD97';
  document.getElementById('result-body').innerHTML=
    '<p class="eyebrow">你的 MFD 金錢財務性格</p>'+
    '<span class="result-badge" style="background:'+p.bg+';color:'+p.text+';border:0.5px solid '+p.border+'">'+p.label+' · '+p.code+'</span>'+
    '<p class="result-title">'+p.role+'</p>'+
    '<p class="result-role" style="color:'+p.color+'">主導功能：'+p.label+'（'+p.code+'）</p>'+
    sigHtml+
    '<p class="result-desc">'+p.desc+'</p>'+
    '<p class="slabel">財務優勢</p>'+
    '<div class="tags">'+p.strengths.map(function(s){return '<span class="tag g">'+s+'</span>';}).join('')+'</div>'+
    '<p class="slabel">需要警覺的財務盲區</p>'+
    '<div class="tags">'+p.risks.map(function(r){return '<span class="tag r">'+r+'</span>';}).join('')+'</div>'+
    '<p class="slabel" style="margin-bottom:0.5rem">給你的提醒</p>'+
    '<div class="tip-box"><p>'+p.tip+'</p></div>'+
    '<hr class="divider">'+
    '<p class="slabel">能量方向</p>'+
    '<div style="margin-bottom:1.25rem"><span class="tag" style="'+dirColor+';border-width:0.5px">'+dirLabel+'</span></div>'+
    '<p class="slabel">功能傾向分佈</p>'+
    '<div class="bars">'+bars+'</div>';
  document.getElementById('s-result').classList.add('active');
}
function restart(){
  document.getElementById('s-result').classList.remove('active');
  p1Idx=0;p1Ans=[];p1Sel=null;
  renderP1();
  document.getElementById('s-p1').classList.add('active');
}
</script>
</body>
</html>
